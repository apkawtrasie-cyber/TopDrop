<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" fill="none" role="img" aria-label="TopDrop.ch logo">
  <defs>
    <linearGradient id="grad-main" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00dbe9"/>
      <stop offset="100%" stop-color="#4edea3"/>
    </linearGradient>
    <linearGradient id="grad-text" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8f0f4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Shopping bag icon -->
  <g transform="translate(0, 18)" filter="url(#glow)">
    <rect x="6" y="28" width="68" height="52" rx="8" fill="url(#grad-main)" opacity="0.95"/>
    <path d="M20 28 C20 28 20 10 40 10 C60 10 60 28 60 28" stroke="url(#grad-main)" stroke-width="6" stroke-linecap="round" fill="none"/>
    <rect x="14" y="44" width="12" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
    <circle cx="40" cy="56" r="5" fill="rgba(255,255,255,0.55)"/>
  </g>

  <!-- Single text element — tspan keeps .ch flush against TopDrop -->
  <text
    x="96"
    y="88"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-weight="800"
    font-size="78"
    letter-spacing="-4"
    xml:space="preserve"
  ><tspan fill="url(#grad-text)">TopDrop</tspan><tspan fill="url(#grad-main)">.ch</tspan></text>
</svg>
